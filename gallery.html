<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Media explore</title>
  <link rel="icon" href="icons/icon-32.png" />
  <link rel="stylesheet" href="gallery.css" />
</head>
<body>
  <main class="explore-shell">
    <header class="explore-header">
      <div>
        <p class="eyebrow">Past uploads</p>
        <h1>Media explore</h1>
      </div>
      <button id="closeBtn" type="button" class="close-button" aria-label="Close gallery">×</button>
    </header>

    <section class="explore-toolbar" aria-live="polite">
      <p id="galleryCount" class="gallery-count">Loading media...</p>
      <button id="refreshBtn" type="button" class="secondary">Refresh</button>
    </section>

    <section id="gallery" class="gallery-grid empty">Loading media...</section>

    <div id="toast" class="toast" hidden></div>
  </main>

  <script src="gallery.js"></script>
</body>
</html>
